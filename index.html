    <style>
        :root {
            --primary: #6366f1; 
            --secondary: #06b6d4; 
            --accent: #f43f5e; 
            --gold: #fbbf24;
            --bg-dark: #020617; 
            --text-main: #f8fafc;
            --glass: rgba(15, 23, 42, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --h1-gradient: linear-gradient(135deg, #fff 30%, #06b6d4 100%);
            --footer-text: rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.15), transparent 40%);
            animation: pulseBg 12s ease-in-out infinite alternate;
        }
        @keyframes pulseBg { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 450px;
            padding: 60px 24px;
            z-index: 1;
        }

        .profile-img {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--secondary); margin-bottom: 25px;
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.3);
            transition: 0.5s;
        }
        .profile-img:hover { transform: rotate(5deg) scale(1.05); }

        h1 {
            font-size: clamp(2.4rem, 9vw, 3rem); font-weight: 900;
            text-transform: uppercase; letter-spacing: -2px;
            background: var(--h1-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; line-height: 1;
            text-align: center;
            filter: drop-shadow(0 5px 15px rgba(6, 182, 212, 0.2));
        }

        .tagline {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 6px;
            color: var(--secondary); font-weight: 700; margin: 12px 0 45px;
            text-align: center; opacity: 0.9;
        }

        .links-wrapper { display: flex; flex-direction: column; gap: 18px; width: 100%; }

        .link-card {
            background: var(--glass); 
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px 25px; border-radius: 22px; text-decoration: none;
            color: var(--text-main); font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; font-size: 0.85rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; position: relative;
            overflow: hidden;
        }

        .link-card i { position: absolute; left: 25px; font-size: 1.3rem; color: var(--secondary); transition: 0.3s; }

        .link-card:hover {
            transform: translateY(-5px); 
            border-color: var(--secondary);
            background: rgba(255, 255, 255, 0.15); 
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 15px rgba(6, 182, 212, 0.2);
        }
        
        .link-card:hover i { transform: scale(1.2); color: #fff; }

        .link-main { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none;
        }
        .link-main i { color: #fff; }

        .link-review {
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .link-review i { color: var(--gold); }
        .link-review:hover { border-color: var(--gold); box-shadow: 0 10px 25px rgba(251, 191, 36, 0.2); }

        footer { 
            width: 100%;
            padding: 50px 20px; 
            text-align: center;
            background: linear-gradient(to top, #000 0%, transparent 100%);
        }

        .footer-link { text-decoration: none; display: inline-block; margin-bottom: 20px; }

        .copyright-text {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 3px;
            text-transform: uppercase; color: var(--footer-text); transition: 0.3s;
        }

        .footer-link:hover .copyright-text { color: var(--secondary); }

        .social-icons-footer { display: flex; justify-content: center; gap: 25px; margin-bottom: 25px; }
        .social-icons-footer a { color: var(--footer-text); font-size: 1.6rem; transition: 0.4s; }
        .social-icons-footer a:hover { color: var(--secondary); transform: translateY(-5px); }

        .author-text {
            font-size: 0.65rem; font-weight: 700; letter-spacing: 4px;
            text-transform: uppercase; color: rgba(255,255,255,0.2);
        }
        .author-text a { color: var(--secondary); text-decoration: none; font-weight: 800; }
    </style>
</head>
